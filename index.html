<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Счётчик воды</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1d23;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .wrapper {
      max-width: 420px;
      width: 100%;
      padding-top: 40px;
    }

    .container {
      background: #252830;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      padding: 28px;
      margin-bottom: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    .header h1 {
      color: #c8cdd5;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      color: #6b7280;
      font-size: 13px;
    }

    .data-section {
      background: #1e2028;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid #333640;
    }

    .data-section h2 {
      font-size: 13px;
      color: #8b92a0;
      margin-bottom: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2d35;
    }

    .data-row:last-child { border-bottom: none; }

    .data-label {
      font-size: 13px;
      color: #6b7280;
    }

    .data-value {
      font-weight: 600;
      font-size: 14px;
      color: #c8cdd5;
    }

    .data-time {
      text-align: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a2d35;
      font-size: 12px;
      color: #555b68;
    }

    .buttons-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.98); }

    .btn-get { background: #2563a0; color: #a0d0f0; }
    .btn-get:hover { background: #2e70b0; }

    .btn-calibrate { background: #8a6520; color: #f0d890; }
    .btn-calibrate:hover { background: #9a7530; }

    .btn-reset { background: #a03030; color: #f0a0a0; }
    .btn-reset:hover { background: #b04040; }

    /* История */
    .history-section {
      background: #252830;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      padding: 24px;
      margin-bottom: 16px;
    }

    .history-section h2 {
      font-size: 14px;
      color: #c8cdd5;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
    }

    .history-table th {
      text-align: left;
      font-size: 12px;
      color: #8b92a0;
      font-weight: 500;
      padding: 6px 0;
      border-bottom: 1px solid #333640;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .history-table td {
      padding: 8px 0;
      font-size: 13px;
      color: #c8cdd5;
      border-bottom: 1px solid #2a2d35;
    }

    .history-table tr:last-child td { border-bottom: none; }

    .history-empty {
      text-align: center;
      color: #555b68;
      font-size: 13px;
      padding: 16px 0;
    }

    .history-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2d35;
    }

    .history-row:last-child { border-bottom: none; }

    .history-month {
      font-size: 13px;
      color: #8b92a0;
    }

    .history-liters {
      font-size: 13px;
      font-weight: 600;
      color: #a0d0f0;
    }

    /* Модалка */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #252830;
      border-radius: 12px;
      padding: 28px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .modal h3 {
      color: #c8cdd5;
      margin-bottom: 16px;
      font-size: 17px;
      font-weight: 600;
    }

    .modal input {
      width: 100%;
      padding: 12px;
      border: 1px solid #333640;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      margin-bottom: 18px;
      background: #1e2028;
      color: #c8cdd5;
    }

    .modal input:focus { outline: none; border-color: #5a6a80; }

    .modal-buttons { display: flex; gap: 10px; }

    .modal-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn-confirm { background: #2563a0; color: #a0d0f0; }
    .modal-btn-confirm:hover { background: #2e70b0; }

    .modal-btn-cancel { background: #444850; color: #b0b8c0; }
    .modal-btn-cancel:hover { background: #505560; }

    .status {
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .status.success { display: block; background: #1e3028; color: #6abf80; }
    .status.error { display: block; background: #301e1e; color: #c08080; }
    .status.loading { display: block; background: #302e1e; color: #c0b080; }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- ОСНОВНЫЕ ДАННЫЕ -->
    <div class="container">
      <div class="header">
        <h1>Счётчик воды</h1>
        <p>Мониторинг расхода</p>
      </div>

      <div class="data-section">
        <h2>Текущие данные</h2>
        <div class="data-row">
          <span class="data-label">За сегодня</span>
          <span class="data-value" id="daily">--</span>
        </div>
        <div class="data-row">
          <span class="data-label">За этот месяц</span>
          <span class="data-value" id="monthly">--</span>
        </div>
        <div class="data-row">
          <span class="data-label">За всё время</span>
          <span class="data-value" id="total">--</span>
        </div>
        <div class="data-time" id="lastUpdate">Обновление: --</div>
      </div>

      <div class="buttons-section">
        <button class="btn btn-get" onclick="getData()">Получить данные</button>
        <button class="btn btn-calibrate" onclick="openModal()">Калибровка</button>
        <button class="btn btn-reset" onclick="resetAll()">Сброс</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <!-- ИСТОРИЯ ПО МЕСЯЦАМ -->
    <div class="history-section">
      <h2>Расход по месяцам</h2>
      <div id="historyList">
        <div class="history-empty">Загрузка...</div>
      </div>
    </div>
  </div>

  <!-- МОДАЛКА КАЛИБРОВКИ -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Калибровка</h3>
      <p style="color:#6b7280;margin-bottom:12px;font-size:13px;">Импульсов на литр:</p>
      <input type="number" id="calInput" value="450" min="1" max="10000">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-confirm" onclick="confirmCal()">Подтвердить</button>
        <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    //  НАСТРОЙКА — ВСТАВЬТЕ ВАШ URL
    // ============================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVzdhz5pcl-hvEZh9PaFuBRxJ4-cozTNM9jMdVJXD0wQAXi5pm9aHiMGeIxAeGoY1F5w/exec";

    // ============================================
    //  УТИЛИТЫ
    // ============================================
    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function hideStatus() {
      document.getElementById('status').className = 'status';
    }

    function fmt(v) {
      if (v === 0) return '0 л';
      if (v < 0.001) return '0 л';
      if (v < 1) return v.toFixed(3) + ' л';
      if (v < 100) return v.toFixed(2) + ' л';
      return v.toFixed(1) + ' л';
    }

    function monthName(yyyy_mm) {
      const months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                       'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
      const parts = yyyy_mm.split('-');
      if (parts.length < 2) return yyyy_mm;
      var m = parseInt(parts[1]) - 1;
      return months[m] + ' ' + parts[0];
    }

    // ============================================
    //  ПОЛУЧИТЬ ВСЕ ДАННЫЕ
    // ============================================
    async function getData() {
      showStatus('Загрузка...', 'loading');
      try {
        const r = await fetch(SCRIPT_URL + '?action=read_all');
        const res = await r.json();
        if (!res.success) {
          showStatus('Ошибка: ' + (res.error || '?'), 'error');
          return;
        }

        // Текущие данные
        const c = res.current;
        document.getElementById('daily').textContent = fmt(c.daily);
        document.getElementById('monthly').textContent = fmt(c.monthly);
        document.getElementById('total').textContent = fmt(c.total);
        document.getElementById('lastUpdate').textContent = 'Обновление: ' + c.time;

        // История
        renderHistory(res.history || []);

        showStatus('Данные обновлены', 'success');
        setTimeout(hideStatus, 3000);
      } catch (e) {
        showStatus('Ошибка сети', 'error');
      }
    }

    // ============================================
    //  ОТРИСОВКА ИСТОРИИ
    // ============================================
    function renderHistory(history) {
      const el = document.getElementById('historyList');

      if (!history || history.length === 0) {
        el.innerHTML = '<div class="history-empty">Нет данных за прошлые месяцы</div>';
        return;
      }

      // Сортируем по убыванию (новые сверху)
      history.sort(function(a, b) {
        return b.month.localeCompare(a.month);
      });

      var html = '';
      for (var i = 0; i < history.length; i++) {
        html += '<div class="history-row">' +
          '<span class="history-month">' + monthName(history[i].month) + '</span>' +
          '<span class="history-liters">' + fmt(history[i].liters) + '</span>' +
          '</div>';
      }
      el.innerHTML = html;
    }

    // ============================================
    //  КАЛИБРОВКА
    // ============================================
    function openModal() {
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    async function confirmCal() {
      const v = parseFloat(document.getElementById('calInput').value);
      if (isNaN(v) || v <= 0 || v > 10000) {
        showStatus('Введите число 1-10000', 'error');
        return;
      }
      closeModal();
      showStatus('Сохранение...', 'loading');
      try {
        const r = await fetch(SCRIPT_URL + '?action=calibrate&calibration=' + v);
        const res = await r.json();
        if (!res.success) { showStatus('Ошибка', 'error'); return; }
        showStatus('Калибровка: ' + v + ' имп/л', 'success');
        setTimeout(getData, 1000);
      } catch (e) {
        showStatus('Ошибка сети', 'error');
      }
    }

    // ============================================
    //  СБРОС
    // ============================================
    async function resetAll() {
      if (!confirm('Сбросить все параметры?\nКалибровка → 450\nВсё время → 0')) return;
      showStatus('Сброс...', 'loading');
      try {
        const r = await fetch(SCRIPT_URL + '?action=reset');
        const res = await r.json();
        if (!res.success) { showStatus('Ошибка', 'error'); return; }
        showStatus('Параметры сброшены', 'success');
        setTimeout(getData, 1000);
      } catch (e) {
        showStatus('Ошибка сети', 'error');
      }
    }

    // ============================================
    //  ИНИЦИАЛИЗАЦИЯ
    // ============================================
    setInterval(getData, 60000);
    window.addEventListener('load', getData);

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
